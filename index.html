;color:#fff;font-weight:900;font-size:13px;letter-spacing:.12em;border-radius:10px;box-shadow:0 8px 24px #0008;pointer-events:none;white-space:nowrap}.card.tar-capture:hover{transform:translateY(-10px) scale(1.04);box-shadow:0 0 0 6px #9af0bc,0 0 0 12px #7ee0a855,0 0 42px #7ee0a8bb;filter:saturate(1.2) brightness(1.06)}.card.tar-sac{box-shadow:0 0 0 5px #f0d36cdd,0 0 0 10px #f0d36c33,0 0 32px #f0d36c77;filter:saturate(1.12)}.card.tar-sac::after{content:"SACRIFICE";position:absolute;left:50%;bottom:10px;transform:translateX(-50%) rotate(-8deg);padding:4px 8px;border:3px solid #fff;background:#8a6a10eb;color:#fff;font-weight:900;font-size:12px;letter-spacing:.1em;border-radius:10px;box-shadow:0 8px 24px #0008;pointer-events:none;white-space:nowrap}.card.tar-sac:hover{transform:translateY(-10px) scale(1.04);box-shadow:0 0 0 6px #f6e19a,0 0 0 12px #f0d36c55,0 0 42px #f0d36cbb;filter:saturate(1.2) brightness(1.06)}.card.tar-let{box-shadow:0 0 0 5px #8cc8ffdd,0 0 0 10px #8cc8ff33,0 0 32px #8cc8ff77;filter:saturate(1.12)}.card.tar-let::after{content:"ENEMY";position:absolute;left:50%;bottom:10px;transform:translateX(-50%) rotate(-8deg);padding:4px 8px;border:3px solid #fff;background:#245f95eb;color:#fff;font-weight:900;font-size:13px;letter-spacing:.12em;border-radius:10px;box-shadow:0 8px 24px #0008;pointer-events:none;white-space:nowrap}.card.tar-let:hover{transform:translateY(-10px) scale(1.04);box-shadow:0 0 0 6px #b2d9ff,0 0 0 12px #8cc8ff55,0 0 42px #8cc8ffbb;filter:saturate(1.2) brightness(1.06)}@keyframes discardPulse{0%,100%{box-shadow:0 0 0 6px #ff8c8ccc,0 0 0 12px #ff8c8c33,0 0 28px #ff8c8caa}50%{box-shadow:0 0 0 8px #ff8c8cff,0 0 0 16px #ff8c8c55,0 0 52px #ff8c8cff}}.empty{width:var(--cardw);height:var(--cardh);border-radius:14px;border:1px dashed #ffffff20;background:linear-gradient(180deg,rgba(255,255,255,.02),rgba(255,255,255,.01))}.hint{margin-top:5px;min-height:14px;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);visibility:hidden}.hint.cap{color:var(--cap)}.hint.sac{color:var(--sac)}.hint.let{color:var(--let)}.hint.off{opacity:.35}.stackwrap{display:flex;align-items:center;gap:10px}.vlabel{color:var(--muted);font-size:11px;letter-spacing:.16em;text-transform:uppercase;writing-mode:vertical-rl;transform:rotate(180deg);user-select:none;text-shadow:0 1px 0 rgba(0,0,0,.35)}.stack{position:relative;width:var(--cardw);height:var(--cardh)}.stack .card{position:absolute;left:0;top:0}.count{position:absolute;right:-7px;bottom:-7px;min-width:30px;height:30px;padding:0 8px;border-radius:999px;background:#0f1613;border:1px solid #ffffff14;display:grid;place-items:center;font-size:12px;font-weight:800;box-shadow:0 6px 18px #0007}.action{width:var(--act);height:var(--act);border-radius:26px;border:3px solid #c9ffe0;background:linear-gradient(180deg,#244434 0%,#182b21 100%);color:#dfffea;display:grid;place-items:center;font-size:18px;font-weight:900;letter-spacing:.12em;line-height:1.05;cursor:pointer;transition:transform .15s ease,opacity .15s ease,background .15s ease,box-shadow .15s ease,filter .15s ease;user-select:none;position:absolute;left:calc(100% + 18px);top:50%;transform:translateY(-50%);box-shadow:0 0 0 4px #7ee0a844,0 10px 28px #0008,0 0 30px #7ee0a855;text-transform:uppercase;text-align:center;padding:10px}.action::before{content:"✓";display:block;font-size:34px;line-height:1;margin-bottom:6px;color:#9cffc2;text-shadow:0 0 18px #7ee0a899}.action:hover{transform:translateY(calc(-50% - 2px)) scale(1.03);background:linear-gradient(180deg,#2b523e 0%,#1d3528 100%);filter:brightness(1.06);box-shadow:0 0 0 5px #7ee0a866,0 14px 34px #0009,0 0 40px #7ee0a877}.action:active{transform:translateY(-50%) scale(.99)}.action.off{display:none}.action.done{color:#e9fff1}#mini{position:fixed;left:10px;bottom:8px;font-size:11px;color:var(--muted);opacity:.9;text-shadow:0 1px 0 rgba(0,0,0,.4)}.win{color:var(--gold)!important}.lose{color:var(--bad)!important}@media (max-width:1000px){:root{--cardw:min(18vw,120px);--act:92px}#app{grid-template-columns:120px 1fr 120px}.action{font-size:16px}.action::before{font-size:30px}.card.tar-capture::after,.card.tar-sac::after,.card.tar-let::after{font-size:11px}}@media (max-width:720px){:root{--cardw:min(20vw,92px);--gap:8px;--act:78px}body{padding:6px}#app{height:calc(100vh - 12px);grid-template-columns:82px 1fr 82px;gap:6px}.card.discard-ready::after{font-size:12px;padding:4px 8px}.card.tar-capture::after,.card.tar-sac::after,.card.tar-let::after{font-size:9px;padding:3px 6px;bottom:7px}.action{left:calc(100% + 12px);font-size:12px;border-radius:20px;padding:8px}.action::before{font-size:24px;margin-bottom:4px}}</style></head><body><div id="app"><div id="top"><div id="status"></div></div><div class="side"><div class="stackwrap"><div class="vlabel">Enemy</div><div class="stack" id="ed"></div></div><div class="stackwrap"><div class="vlabel">Deck</div><div class="stack" id="pd"></div></div></div><div class="center"><div class="row" id="enemy"></div><div></div><div class="handstage"><div id="handwrap" class="handwrap"><div class="hand" id="hand"></div><div id="doneAct" class="action done off" title="Continue">Done</div></div></div></div><div class="side"><div class="stackwrap"><div class="stack" id="ec"></div><div class="vlabel">Capture</div></div><div class="stackwrap"><div class="stack" id="dd"></div><div class="vlabel">Discard</div></div></div></div><div id="mini"></div><script>const SUITS=["hearts","diamonds","clubs","spades"],E=id=>document.getElementById(id),isJ=c=>c.suit==="joker",isFace=c=>!isJ(c)&&(c.value===11||c.value===12||c.value===13||c.value===14),val=c=>isJ(c)?0:c.value,nm=c=>isJ(c)?c.name:`${c.suit} ${c.value===11?"J":c.value===12?"Q":c.value===13?"K":c.value===14?"A":c.value}`,src=c=>isJ(c)?`cards/${c.id}.webp`:`cards/${c.suit}_${c.value}.webp`,BACK="cards/back.webp",sh=a=>{for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a};let G=null;function makeDeck(){let d=[];for(let s of SUITS)for(let v=2;v<=14;v++)d.push({suit:s,value:v,id:`${s}_${v}`});d.push({suit:"joker",value:0,id:"joker_1",name:"Joker 1"});d.push({suit:"joker",value:0,id:"joker_2",name:"Joker 2"});return d}function setMini(t,c=""){let m=E("mini");m.className=c;m.textContent=t||""}function setStatus(){E("status").textContent=""}function stack(el,count){el.innerHTML="";if(!count){let d=document.createElement("div");d.className="empty";el.appendChild(d);return}for(let i=0;i<Math.min(3,count);i++){let c=document.createElement("div");c.className="card";c.style.transform=`translate(${i*2}px,${-i*2}px)`;c.innerHTML=`<img src="${BACK}" alt="" draggable="false">`;el.appendChild(c)}let n=document.createElement("div");n.className="count";n.textContent=count;el.appendChild(n)}function cardEl(c,click,sel=0,cls=""){let d=document.createElement("div");d.className=`card${click?" click":""}${sel?" sel":""}${cls?` ${cls}`:""}`;d.innerHTML=`<img src="${src(c)}" alt="${nm(c)}" draggable="false">`;if(click)d.onclick=click;return d}function captureCheck(ti,hi){let t=G.enemyRow[ti];if(!t||!hi.length)return{ok:0};let used=hi.map(i=>G.hand[i]),non=used.filter(c=>!isJ(c)),jok=used.filter(isJ);if(!non.length)return{ok:0};if(non.some(c=>c.suit!==t.suit))return{ok:0};let m=Math.max(...non.map(val)),tot=non.reduce((a,c)=>a+val(c),0)+jok.length*m;return{ok:tot>=val(t),tot}}function canSacrificeTo(ti,hi){if(hi.length!==2)return 0;let cards=hi.map(i=>G.hand[i]);if(cards.some(c=>!isJ(c)&&isFace(c)))return 0;return ti!=null&&!!G.enemyRow[ti]}function canLetAt(ti,hi){return ti===3&&hi.length===1&&!!G.enemyRow[3]}function intentFor(ti){let hi=[...G.selHand].sort((a,b)=>a-b);if(!hi.length)return{t:"",l:""};if(captureCheck(ti,hi).ok)return{t:"capture",l:"capture"};if(canSacrificeTo(ti,hi))return{t:"sac",l:"sacrifice"};if(canLetAt(ti,hi))return{t:"let",l:"enemy capture"};return{t:"off",l:""}}function renderEnemy(){let root=E("enemy");root.innerHTML="";G.enemyRow.forEach((c,i)=>{let s=document.createElement("div");s.className="slot";if(c){let intent=G.phase==="capture"&&!G.over&&G.selHand.size>0?intentFor(i):{t:"",l:""},click=G.phase==="capture"&&!G.over&&G.selHand.size>0?()=>enemyClick(i):null,cls=intent.t==="capture"?"tar-capture":intent.t==="sac"?"tar-sac":intent.t==="let"?"tar-let":"";s.appendChild(cardEl(c,click,G.selEnemy===i,cls));let h=document.createElement("div");h.className=`hint ${intent.t||"off"}`;h.textContent=intent.l;s.appendChild(h)}else{let e=document.createElement("div");e.className="empty";s.appendChild(e);let h=document.createElement("div");h.className="hint off";h.textContent="";s.appendChild(h)}root.appendChild(s)})}function renderHand(){let root=E("hand");root.innerHTML="";for(let i=0;i<4;i++)if(i<G.hand.length){let c=G.hand[i],click=!G.over&&(G.phase==="capture"||G.phase==="discard")?()=>handClick(i):null,cls=G.phase==="discard"&&!G.over?"discard-ready":"";root.appendChild(cardEl(c,click,G.selHand.has(i),cls))}else{let e=document.createElement("div");e.className="empty";root.appendChild(e)}}function renderPiles(){stack(E("pd"),G.personalDeck.length);stack(E("dd"),G.discard.length);stack(E("ed"),G.enemyDeck.length);stack(E("ec"),G.enemyCapture.length)}function renderActions(){let d=G.phase==="discard"&&!G.over;E("doneAct").className=`action done${d?"":" off"}`}function render(){renderEnemy();renderHand();renderPiles();renderActions();setStatus()}function refillPersonal(){if(!G.personalDeck.length&&G.discard.length)G.personalDeck=sh(G.discard.splice(0))}function compactEnemyRow(){let a=G.enemyRow.filter(Boolean);while(a.length<4)a.push(null);G.enemyRow=a}function addEnemyLeft(c){for(let i=3;i>0;i--)G.enemyRow[i]=G.enemyRow[i-1];G.enemyRow[0]=c}function fillEnemyRow(){while(G.enemyDeck.length&&G.enemyRow.some(x=>!x))addEnemyLeft(G.enemyDeck.pop())}function enemyPhase(){compactEnemyRow();fillEnemyRow()}function autoDraw(){while(G.hand.length<4){refillPersonal();if(!G.personalDeck.length)break;G.hand.push(G.personalDeck.pop())}}function checkEnd(){if(G.enemyCapture.some(c=>!isJ(c)&&isFace(c))){G.over=1;G.won=0;setMini("Lost","lose");render();return 1}if(!G.enemyDeck.length&&G.enemyRow.every(x=>!x)){G.over=1;G.won=1;setMini("Won","win");render();return 1}return 0}function beginCapture(){autoDraw();G.phase="capture";G.selHand.clear();G.selEnemy=null;setMini("");render();checkEnd()}function nextTurn(initial=0){if(G.over)return;if(initial)enemyPhase();else{G.round++;if(G.enemyDeck.length)enemyPhase()}G.selHand.clear();G.selEnemy=null;setMini("");if(!G.hand.length){beginCapture();return}G.phase="discard";render();checkEnd()}function setupGame(){let deck=makeDeck(),pd=[],ed=[];for(let c of deck)(isJ(c)||c.value<=4?pd:ed).push(c);sh(pd);sh(ed);G={personalDeck:pd,discard:[],enemyDeck:ed,enemyCapture:[],hand:[],enemyRow:[null,null,null,null],selHand:new Set,selEnemy:null,phase:"discard",over:0,won:0,round:1};for(let i=0;i<4;i++)G.enemyRow[i]=G.enemyDeck.pop()||null;for(let i=0;i<4;i++)if(G.enemyRow[i]&&isFace(G.enemyRow[i])){G.enemyDeck.unshift(G.enemyRow[i]);G.enemyRow[i]=null}compactEnemyRow();fillEnemyRow();nextTurn(1)}function toggleHand(i){G.selHand.has(i)?G.selHand.delete(i):G.selHand.add(i)}function handClick(i){if(G.over)return;if(G.phase==="discard"){G.discard.push(G.hand.splice(i,1)[0]);G.selHand.clear();render();return}if(G.phase==="capture"){toggleHand(i);render()}}function finishDiscard(){if(G.over||G.phase!=="discard")return;beginCapture()}function doCapture(ti){let hi=[...G.selHand].sort((a,b)=>a-b),r=captureCheck(ti,hi);if(!r.ok)return 0;let spent=[];for(let k=hi.length-1;k>=0;k--)spent.push(G.hand.splice(hi[k],1)[0]);let en=G.enemyRow[ti];G.enemyRow[ti]=null;G.discard.push(...spent,en);G.selHand.clear();G.selEnemy=null;render();if(checkEnd())return 1;setTimeout(()=>nextTurn(0),180);return 1}function doLet(){let hi=[...G.selHand].sort((a,b)=>a-b);if(!canLetAt(3,hi))return 0;let i=hi[0],mine=G.hand.splice(i,1)[0],en=G.enemyRow[3];G.enemyRow[3]=null;G.enemyCapture.push(en,mine);G.selHand.clear();G.selEnemy=null;render();if(checkEnd())return 1;setTimeout(()=>nextTurn(0),180);return 1}function doSacrifice(ti){let hi=[...G.selHand].sort((a,b)=>a-b);if(!canSacrificeTo(ti,hi))return 0;let rem=[];for(let k=hi.length-1;k>=0;k--)rem.push(G.hand.splice(hi[k],1)[0]);G.enemyCapture.push(...rem);let en=G.enemyRow[ti];G.enemyRow[ti]=null;G.enemyDeck.unshift(en);G.selHand.clear();G.selEnemy=null;render();if(checkEnd())return 1;setTimeout(()=>nextTurn(0),180);return 1}function enemyClick(i){if(G.over||G.phase!=="capture"||!G.selHand.size)return;if(doCapture(i))return;if(doSacrifice(i))return;if(i===3&&doLet())return;render()}document.addEventListener("dragstart",e=>e.preventDefault());document.addEventListener("selectstart",e=>e.preventDefault());document.addEventListener("contextmenu",e=>e.preventDefault());E("doneAct").onclick=finishDiscard;setupGame();</script></body></html>
